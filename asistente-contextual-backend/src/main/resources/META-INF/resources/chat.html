<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Contextual - TFG</title>
    <!-- Importar Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-body: #f7f7f8;
            --bg-sidebar: #ffffff;
            --bg-chat: #ffffff;
            --primary-color: #10a37f;
            --primary-hover: #0e8c6d;
            --text-primary: #343541;
            --text-secondary: #6e6e80;
            --border-color: #e5e5e5;
            --bubble-user: #e7f8f3;
            --bubble-ai: #f7f7f8;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-body);
            color: var(--text-primary);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cdcdcd;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* Sidebar principal */
        #sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: margin-left 0.3s ease;
            height: 100vh;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-section-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fcfcfc;
        }

        .sidebar-section-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        #sidebar.collapsed {
            margin-left: -320px;
        }

        #sidebar-toggle {
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #sidebar-toggle:hover {
            background: var(--border-color);
        }

        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .refresh-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s;
            position: relative;
            z-index: 10;
        }

        .refresh-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        /* Estilos para la lista de chats */
        #chat-list {
            list-style: none;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            color: var(--text-primary);
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: var(--bg-body);
            border-color: var(--border-color);
        }

        .chat-item.active {
            background: #e7f3ef;
            border-color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
        }

        .chat-item .chat-actions {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .chat-item:hover .chat-actions {
            opacity: 1;
        }

        .chat-item svg {
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        #new-chat-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            transition: background 0.2s;
        }

        #new-chat-btn:hover {
            background: var(--primary-hover);
        }

        /* Estilos existentes para documentos base */
        #documents-list {
            list-style: none;
        }

        .document-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: var(--bg-body);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .document-item:hover {
            border-color: #ccc;
        }

        .doc-info {
            flex: 1;
            min-width: 0;
            /* for text truncation */
            margin-right: 10px;
        }

        .document-item .name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .document-item .meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #fee2e2;
            color: var(--danger-hover);
        }

        /* Chat area */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
        }

        #chat-header {
            padding: 15px 30px;
            background: var(--bg-chat);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #chat-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        #connection-status {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        #connection-status.connected .status-dot {
            background: var(--primary-color);
        }

        #connection-status.disconnected .status-dot {
            background: var(--danger-color);
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        .message-row.ai-row {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 15px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .user-bubble {
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-bubble {
            background: var(--bg-body);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
        }

        .ai-bubble h1,
        .ai-bubble h2,
        .ai-bubble h3 {
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .ai-bubble h1:first-child,
        .ai-bubble h2:first-child,
        .ai-bubble h3:first-child {
            margin-top: 0;
        }

        .ai-bubble p {
            margin-bottom: 15px;
        }

        .ai-bubble p:last-child {
            margin-bottom: 0;
        }

        .ai-bubble ul,
        .ai-bubble ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .ai-bubble pre {
            background: #2d2d2d;
            color: #ccc;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 15px;
        }

        .ai-bubble code {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #e7f8f3;
            color: #10a37f;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.85em;
            font-weight: 500;
            border: 1px solid #bceadd;
            display: inline-block;
            margin: 4px 4px 0 0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .ai-bubble hr {
            border: 0;
            height: 1px;
            background: var(--border-color);
            margin: 15px 0;
        }

        .ai-bubble pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .ai-bubble blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 15px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        /* System/Error messages */
        .system-bubble {
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            margin: 0 auto;
            background: #fff3cd;
            color: #856404;
        }

        .error-bubble {
            background: #fdf2f2;
            color: var(--danger-color);
            border: 1px solid #fde8e8;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            padding: 15px 20px;
            max-width: 75%;
            border-radius: 8px;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
            color: var(--text-secondary);
            font-size: 14px;
            align-items: center;
            gap: 8px;
        }

        .typing-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* Input area */
        #input-container {
            padding: 20px 30px 30px;
            background: var(--bg-chat);
        }

        #input-box {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        #input-box:focus-within {
            border-color: #a8a8a8;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        #msg {
            flex: 1;
            border: none;
            padding: 8px;
            font-size: 15px;
            background: transparent;
            outline: none;
            color: var(--text-primary);
        }

        #send-btn {
            background: transparent;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: var(--bubble-user);
        }

        #send-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Loading spinner for upload */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, .1);
            border-radius: 50%;
            border-top-color: var(--text-primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="sidebar">
        <!-- Sección de Conversaciones -->
        <div class="sidebar-section" id="chats-section">
            <div class="sidebar-section-header">
                <h2>Conversaciones</h2>
            </div>
            <div class="scroll-area">
                <button id="new-chat-btn" onclick="crearNuevoChat()">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Nuevo Chat
                </button>
                <ul id="chat-list">
                    <!-- Los chats se cargan dinámicamente -->
                </ul>
            </div>
        </div>

        <!-- Sección de Base de Conocimiento -->
        <div class="sidebar-section" id="knowledge-section">
            <div class="sidebar-section-header">
                <h2>Base de Conocimiento</h2>
                <button class="refresh-btn" onclick="fetchDocuments()" title="Recargar lista de documentos">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
            </div>

            <div class="scroll-area">
                <div id="upload-area" style="margin-bottom: 15px;">
                    <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt" style="display: none;" />
                    <button id="upload-btn" onclick="triggerFileInput()"
                        style="width: 100%; padding: 10px; background: white; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                            stroke-linecap="round" stroke-linejoin="round" height="16" width="16"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Subir Documento
                    </button>
                    <div id="upload-status"></div>
                </div>

                <div id="documents-list">
                    <p style="color: var(--text-secondary); text-align: center; padding: 20px; font-size: 13px;">
                        No hay documentos cargados
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div id="main">
        <div id="chat-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button id="sidebar-toggle" onclick="toggleSidebar()" title="Ocultar/Mostrar panel lateral"
                    style="color: var(--text-secondary);">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="22" width="22" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </button>
                <h1>Asistente Contextual</h1>
            </div>
            <div id="connection-status" class="disconnected">
                <div class="status-dot"></div>
                <span id="status-text">Desconectado</span>
            </div>
        </div>

        <div id="chat">

        </div>

        <div id="typing-container" style="padding: 0 30px 10px; display: flex; width: 100%;">
            <div id="typing-indicator" class="typing-indicator">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                Asistente está escribiendo...
            </div>
        </div>

        <div id="input-container">
            <div id="input-box">
                <input type="text" id="msg" placeholder="Envía un mensaje al asistente..."
                    onkeypress="if(event.key === 'Enter') send()" autocomplete="off">
                <button id="send-btn" onclick="send()" title="Enviar mensaje">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20" height="1em"
                        width="1em" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script>
        // ========== Variables Globales ==========
        let idSesionActual;

        // ========== Gestión de Chats ==========
        async function crearNuevoChat() {
            // Generar nuevo UUID para la sesión
            idSesionActual = crypto.randomUUID();

            // Limpiar contenedor de mensajes
            chat.innerHTML = "";
            log("Sistema", "Nueva conversación iniciada.", "system");

            // Cerrar socket anterior y abrir nuevo con el ID
            if (socket) {
                socket.close();
            }
            connectWebSocket(idSesionActual);
        }

        async function cargarListaChats() {
            var chatList = document.getElementById("chat-list");
            if (!chatList) return;

            try {
                const response = await fetch("/api/chats");
                if (!response.ok) throw new Error("Error cargando chats");

                const sesiones = await response.json();
                chatList.innerHTML = "";

                if (sesiones.length === 0) {
                    chatList.innerHTML = '<p style="color: var(--text-secondary); text-align: center; font-size: 13px;">Sin chats previos</p>';
                    return;
                }

                sesiones.forEach(sesion => {
                    var item = document.createElement("li");
                    item.className = "chat-item";
                    if (idSesionActual === sesion.sessionId) {
                        item.classList.add("active");
                    }

                    // Título y Fecha/Hora formateada
                    const fecha = new Date(sesion.updatedAt);
                    const fechaFormateada = fecha.toLocaleString();
                    const tituloDisplay = sesion.titulo || "Sin nombre";

                    item.innerHTML = `
                        <div class="chat-info" onclick="cargarHistorialChat('${sesion.sessionId}')" style="flex: 1; display: flex; align-items: center; gap: 10px; overflow: hidden;">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="18" width="18" xmlns="http://www.w3.org/2000/svg">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <div style="display: flex; flex-direction: column; overflow: hidden;">
                                <span class="chat-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500;">${tituloDisplay}</span>
                                <span class="chat-meta" style="font-size: 11px; color: var(--text-secondary);">${fechaFormateada}</span>
                            </div>
                        </div>
                        <div class="chat-actions" style="display: flex; gap: 5px; opacity: 0.7;">
                            <button onclick="event.stopPropagation(); renombrarChat('${sesion.sessionId}', '${tituloDisplay}')" title="Renombrar" style="background: none; border: none; cursor: pointer; padding: 4px;">✏️</button>
                            <button onclick="event.stopPropagation(); borrarChat('${sesion.sessionId}')" title="Borrar" style="background: none; border: none; cursor: pointer; padding: 4px;">🗑️</button>
                        </div>
                    `;
                    chatList.appendChild(item);
                });
            } catch (error) {
                console.error("Error en cargarListaChats:", error);
            }
        }

        async function renombrarChat(id, tituloActual) {
            const nuevoTitulo = prompt("Introduce el nuevo nombre del chat:", tituloActual);
            if (nuevoTitulo === null || nuevoTitulo.trim() === "" || nuevoTitulo === tituloActual) return;

            try {
                const response = await fetch(`/api/chats/${id}/titulo`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(nuevoTitulo)
                });

                if (response.ok) {
                    cargarListaChats();
                } else {
                    alert("Error al renombrar el chat.");
                }
            } catch (error) {
                console.error("Error en renombrarChat:", error);
            }
        }

        async function borrarChat(id) {
            if (!confirm("¿Estás seguro de que deseas eliminar esta conversación?")) return;

            try {
                const response = await fetch(`/api/chats/${id}`, {
                    method: "DELETE"
                });

                if (response.ok) {
                    if (id === idSesionActual) {
                        crearNuevoChat();
                    }
                    cargarListaChats();
                } else {
                    alert("Error al borrar el chat.");
                }
            } catch (error) {
                console.error("Error en borrarChat:", error);
            }
        }

        async function cargarHistorialChat(id) {
            try {
                const response = await fetch(`/api/chats/${id}/historial`);
                if (!response.ok) throw new Error("No se pudo cargar el historial");

                let data = await response.json();
                let history = typeof data === 'string' ? JSON.parse(data) : data;

                idSesionActual = id;
                chat.innerHTML = "";

                history.forEach(msg => {
                    if (msg.type === "USER") {
                        let textoUsuario = msg.text || (msg.contents && msg.contents.length > 0 ? msg.contents[0].text : "");

                        if (textoUsuario.includes("Answer using the following information:")) {
                            textoUsuario = textoUsuario.split("Answer using the following information:")[0].trim();
                        }

                        if (textoUsuario) log("Usuario", textoUsuario, "user");
                    } else if (msg.type === "AI") {
                        let textoAI = msg.text || "";
                        if (textoAI) log("Asistente", textoAI, "assistant");
                    }
                });

                if (socket) socket.close();
                connectWebSocket(idSesionActual);

                log("Sistema", "Historial de conversación recuperado.", "system");
            } catch (error) {
                console.error("Error en cargarHistorialChat:", error);
                log("Sistema", "Error al recuperar el historial.", "error");
            }
        }

        // Configurar marked.js
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // ========== WebSocket para Chat ==========
        var socket;
        var chat = document.getElementById("chat");
        var statusText = document.getElementById("status-text");
        var connectionStatus = document.getElementById("connection-status");
        var typingIndicator = document.getElementById("typing-indicator");

        function connectWebSocket(idSesion) {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            // Usar el sessionId en la URL como requiere el nuevo backend
            socket = new WebSocket(protocol + "//" + location.host + "/chat/" + idSesion);

            socket.onopen = function () {
                statusText.textContent = "Conectado";
                connectionStatus.className = "connected";
                // No mostrar log de sistema cada vez que conectamos para no ensuciar
            };

            socket.onmessage = function (event) {
                hideTyping();
                log("Asistente", event.data, "assistant");
                // Recargar lista lateral para ver la fecha actualizada si es un chat nuevo
                cargarListaChats();
            };

            socket.onclose = function () {
                statusText.textContent = "Desconectado";
                connectionStatus.className = "disconnected";

                // Solo reconectar si no es un cierre intencionado por cambio de chat
                // En una app real controlaríamos el código de cierre, aquí simplificamos
            };

            socket.onerror = function (error) {
                log("Sistema", "Error de conexión.", "error");
                hideTyping();
            };
        }

        function showTyping() {
            typingIndicator.style.display = 'flex';
            scrollToBottom();
        }

        function hideTyping() {
            typingIndicator.style.display = 'none';
        }

        function scrollToBottom() {
            const chatContainer = document.getElementById("chat");
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function send() {
            var msgInput = document.getElementById("msg");
            var text = msgInput.value.trim();

            if (text !== "") {
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(text);
                    log("Usuario", text, "user");
                    msgInput.value = "";
                    showTyping();
                } else {
                    log("Sistema", "No hay conexión activa. Iniciando nueva...", "error");
                    crearNuevoChat();
                }
            }
        }

        function log(sender, message, type) {
            var row = document.createElement("div");
            row.className = "message-row";

            var bubble = document.createElement("div");
            bubble.className = "message-bubble";

            if (type === "user") {
                row.classList.add("user-row");
                bubble.classList.add("user-bubble");
                bubble.textContent = message; // Raw text for user
            } else if (type === "assistant") {
                row.classList.add("ai-row");
                bubble.classList.add("ai-bubble");
                // Parse Markdown for assistant response
                bubble.innerHTML = marked.parse(message);
            } else if (type === "system") {
                row.style.justifyContent = "center";
                bubble.className = "system-bubble";
                bubble.textContent = message;
            } else if (type === "error") {
                row.style.justifyContent = "center";
                bubble.className = "system-bubble error-bubble";
                bubble.textContent = message;
            }

            row.appendChild(bubble);
            chat.appendChild(row);

            // Auto scroll
            scrollToBottom();
        }

        // ========== Gestión de Documentos ==========
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("collapsed");
        }

        function triggerFileInput() {
            document.getElementById("file-input").click();
        }

        document.getElementById("file-input").addEventListener("change", async function (e) {
            var file = e.target.files[0];
            if (!file) return;

            var uploadStatus = document.getElementById("upload-status");
            uploadStatus.innerHTML = '<div class="spinner"></div> Subiendo...';

            var formData = new FormData();
            formData.append("file", file);

            var metadatos = {
                "autor": "Usuario",
                "fecha": new Date().toISOString()
            };
            formData.append("metadatos", JSON.stringify(metadatos));

            try {
                var response = await fetch("/api/documentos/upload", {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    uploadStatus.innerHTML = "<span style='color: var(--primary-color)'>Subido correctamente</span>";

                    // Recargar lista de documentos
                    fetchDocuments();
                } else {
                    var error = await response.json();
                    uploadStatus.innerHTML = "<span style='color: var(--danger-color)'>Error: " + error.error + "</span>";
                }
            } catch (error) {
                uploadStatus.innerHTML = "<span style='color: var(--danger-color)'>Error de conexión</span>";
            }

            // Limpiar input y estado
            e.target.value = "";
            setTimeout(() => {
                uploadStatus.innerHTML = "";
            }, 3000);
        });

        async function deleteDocument(fileName) {
            if (!confirm('¿Estás seguro de que deseas eliminar el documento "' + fileName + '"?')) {
                return;
            }

            try {
                const response = await fetch('/api/documentos/' + encodeURIComponent(fileName), {
                    method: 'DELETE'
                });

                if (response.ok || response.status === 200 || response.status === 204) {
                    fetchDocuments();
                } else {
                    alert("Error al eliminar el documento.");
                }
            } catch (error) {
                console.error("Error al eliminar documento:", error);
                alert("Error de red al intentar eliminar.");
            }
        }

        async function fetchDocuments() {
            try {
                var response = await fetch("/api/documentos");
                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }
                var documentos = await response.json();

                var list = document.getElementById("documents-list");

                if (!documentos || documentos.length === 0) {
                    list.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px; font-size: 13px;">No hay documentos cargados</p>';
                    return;
                }

                list.innerHTML = "";

                documentos.forEach(doc => {
                    var item = document.createElement("div");
                    item.className = "document-item";

                    var cleanName = typeof doc === "string" ? doc : (doc.nombre || doc.fileName || doc.id || "Documento");
                    var tipoDoc = "DOC";

                    if (typeof doc === "object" && (doc.tipo || doc.contentType || doc.mimeType)) {
                        var mime = doc.tipo || doc.contentType || doc.mimeType;
                        tipoDoc = mime.split('/').pop().toUpperCase();
                        if (tipoDoc.includes("WORDPROCESSINGML")) tipoDoc = "DOCX";
                    } else if (cleanName.includes('.')) {
                        tipoDoc = cleanName.split('.').pop().toUpperCase();
                    }

                    var docSize = typeof doc === "string" ? 0 : (doc.tamanio_bytes || doc.size || doc.sizeBytes || 0);

                    item.innerHTML = `
                    <div class="doc-info" title="${cleanName}">
                        <div class="name">${cleanName}</div>
                        <div class="meta">${tipoDoc} • ${formatBytes(docSize)}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteDocument('${cleanName}')" title="Eliminar documento">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="16" width="16" xmlns="http://www.w3.org/2000/svg"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                console.error("Error cargando documentos:", error);
                var list = document.getElementById("documents-list");
                list.innerHTML = '<p style="color: var(--danger-color); text-align: center; padding: 20px; font-size: 13px;">Error al cargar documentos</p>';
            }
        }

        function formatBytes(bytes) {
            if (!bytes) return "0 B";
            if (bytes < 1024) return bytes + " B";
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
            return (bytes / (1024 * 1024)).toFixed(1) + " MB";
        }

        // Inicialización
        window.addEventListener("load", () => {
            fetchDocuments();
            cargarListaChats();

            // Si no tenemos sesión activa, crear una nueva
            if (!idSesionActual) {
                crearNuevoChat();
            }

            // Recargar documentos periódicamente 
            setInterval(fetchDocuments, 30000);
            setInterval(cargarListaChats, 10000);

            // Focus input on load
            const inputMsg = document.getElementById("msg");
            if (inputMsg) inputMsg.focus();
        });
    </script>
</body>

</html>
