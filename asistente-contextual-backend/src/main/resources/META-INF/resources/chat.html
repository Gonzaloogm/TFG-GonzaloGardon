<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
        S3: Content Security Policy añadida.
        - default-src 'self': solo recursos del mismo origen por defecto.
        - script-src: permite marked.js desde CDN y scripts inline (necesario para el app script).
        - style-src 'unsafe-inline': permite los estilos inline existentes.
        Esto bloquea la carga de scripts externos no autorizados aunque haya XSS.
    -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:;">
    <title>Asistente Contextual - TFG</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!--
        S2: DOMPurify para sanitizar el HTML generado por marked.parse().
        Sin esto, el LLM puede devolver <script> o <img onerror=...> y se ejecutan.
    -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
    <style>
        :root {
            --bg-body: #f7f7f8;
            --bg-sidebar: #ffffff;
            --bg-chat: #ffffff;
            --primary-color: #10a37f;
            --primary-hover: #0e8c6d;
            --text-primary: #343541;
            --text-secondary: #6e6e80;
            --border-color: #e5e5e5;
            --bubble-user: #e7f8f3;
            --bubble-ai: #f7f7f8;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-body);
            color: var(--text-primary);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cdcdcd;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        #sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: margin-left 0.3s ease;
            height: 100vh;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-section-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fcfcfc;
        }

        .sidebar-section-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        #sidebar.collapsed {
            margin-left: -320px;
        }

        #sidebar-toggle {
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #sidebar-toggle:hover {
            background: var(--border-color);
        }

        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .refresh-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        #chat-list {
            list-style: none;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            color: var(--text-primary);
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: var(--bg-body);
            border-color: var(--border-color);
        }

        .chat-item.active {
            background: #e7f3ef;
            border-color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
        }

        /* U7: Transición suave en acciones del chat */
        .chat-item .chat-actions {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .chat-item:hover .chat-actions {
            opacity: 1;
        }

        .chat-item svg {
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        #new-chat-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            transition: background 0.2s;
        }

        #new-chat-btn:hover {
            background: var(--primary-hover);
        }

        #documents-list {
            list-style: none;
        }

        .document-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: var(--bg-body);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .document-item:hover {
            border-color: #ccc;
        }

        .doc-info {
            flex: 1;
            min-width: 0;
            margin-right: 10px;
        }

        .document-item .name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .document-item .meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #fee2e2;
            color: var(--danger-hover);
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
        }

        #chat-header {
            padding: 15px 30px;
            background: var(--bg-chat);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #chat-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        #connection-status {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        #connection-status.connected .status-dot {
            background: var(--primary-color);
        }

        #connection-status.disconnected .status-dot {
            background: var(--danger-color);
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        .message-row.ai-row {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 15px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-bubble {
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 2px;
            align-self: flex-end;
        }

        .ai-bubble {
            background: var(--bg-body);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
            align-self: flex-start;
        }

        .ai-bubble h1,
        .ai-bubble h2,
        .ai-bubble h3 {
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .ai-bubble h1:first-child,
        .ai-bubble h2:first-child,
        .ai-bubble h3:first-child {
            margin-top: 0;
        }

        .ai-bubble p {
            margin-bottom: 15px;
        }

        .ai-bubble p:last-child {
            margin-bottom: 0;
        }

        .ai-bubble ul,
        .ai-bubble ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .ai-bubble pre {
            background: #2d2d2d;
            color: #ccc;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 15px;
        }

        .ai-bubble code {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #e7f8f3;
            color: #10a37f;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.85em;
            font-weight: 500;
            border: 1px solid #bceadd;
            display: inline-block;
            margin: 4px 4px 0 0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .ai-bubble hr {
            border: 0;
            height: 1px;
            background: var(--border-color);
            margin: 15px 0;
        }

        .ai-bubble pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .ai-bubble blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 15px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .system-bubble {
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            margin: 0 auto;
            background: #fff3cd;
            color: #856404;
        }

        .error-bubble {
            background: #fdf2f2;
            color: var(--danger-color);
            border: 1px solid #fde8e8;
        }

        .typing-indicator {
            display: none;
            padding: 15px 20px;
            max-width: 75%;
            border-radius: 8px;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
            color: var(--text-secondary);
            font-size: 14px;
            align-items: center;
            gap: 8px;
        }

        .typing-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        #input-container {
            padding: 20px 30px 30px;
            background: var(--bg-chat);
        }

        /* U5: El input-box ahora aloja un textarea autoexpandible */
        #input-box {
            display: flex;
            align-items: flex-end;
            /* alineación al fondo para el textarea */
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            gap: 8px;
        }

        #input-box:focus-within {
            border-color: #a8a8a8;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /*
         * U5: textarea en lugar de input — crece automáticamente con el contenido.
         * max-height limita el crecimiento a ~6 líneas para no ocupar toda la pantalla.
         */
        #msg {
            flex: 1;
            border: none;
            padding: 8px;
            font-size: 15px;
            background: transparent;
            outline: none;
            color: var(--text-primary);
            resize: none;
            min-height: 38px;
            max-height: 160px;
            overflow-y: auto;
            line-height: 1.5;
            font-family: inherit;
        }

        #send-btn {
            background: transparent;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        #send-btn:hover {
            background: var(--bubble-user);
        }

        /* A2: Estado "enviando" — botón deshabilitado mientras espera respuesta */
        #send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #send-btn svg {
            width: 20px;
            height: 20px;
        }

        /* U6: Contador de caracteres bajo el input */
        #char-counter {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
            padding: 4px 15px 0;
            transition: color 0.2s;
        }

        #char-counter.warning {
            color: #d97706;
        }

        #char-counter.danger {
            color: var(--danger-color);
        }

        /* U1: Indicador de carga del historial */
        .historial-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, .1);
            border-radius: 50%;
            border-top-color: var(--text-primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.4) !important;
            backdrop-filter: blur(2px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-content {
            background: #ffffff !important;
            color: #333333 !important;
            border-radius: 12px !important;
            padding: 30px !important;
            border: 1px solid #e0e0e0 !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important;
            max-width: 400px !important;
            width: 90%;
            font-family: sans-serif;
        }

        .modal-content h2 {
            color: #10a37f !important;
            font-size: 1.4rem !important;
            margin-bottom: 12px !important;
            font-weight: 600 !important;
            margin-top: 0;
        }

        .modal-content p {
            color: #5f6368 !important;
            font-size: 0.95rem !important;
            line-height: 1.5 !important;
        }

        .modal-buttons {
            margin-top: 25px !important;
            display: flex !important;
            justify-content: flex-end !important;
            gap: 12px !important;
        }

        .btn-cancel {
            background: #f1f3f4 !important;
            color: #3c4043 !important;
            border: none !important;
            padding: 10px 20px !important;
            border-radius: 8px !important;
            font-weight: 500 !important;
            cursor: pointer !important;
            font-size: 14px;
        }

        .btn-confirm {
            background: #10a37f !important;
            color: #ffffff !important;
            border: none !important;
            padding: 10px 20px !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            font-size: 14px;
        }

        .btn-confirm:hover {
            background: #0e8c6d !important;
        }

        .btn-cancel:hover {
            background: #e8eaed !important;
        }

        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 99999;
            pointer-events: none;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            max-width: 340px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            animation: toast-in 0.25s ease;
            pointer-events: auto;
        }

        .toast.success {
            background: #e7f8f3;
            color: #0e7a5e;
            border: 1px solid #b2e4d4;
        }

        .toast.error {
            background: #fdf2f2;
            color: #b91c1c;
            border: 1px solid #fde8e8;
        }

        .toast.info {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }

        @keyframes toast-in {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toast-out {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(12px);
            }
        }
    </style>
</head>

<body>
    <div id="sidebar">
        <div class="sidebar-section" id="chats-section">
            <div class="sidebar-section-header">
                <h2>Conversaciones</h2>
            </div>
            <div class="scroll-area">
                <button id="new-chat-btn">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Nuevo Chat
                </button>
                <ul id="chat-list"></ul>
            </div>
        </div>

        <div class="sidebar-section" id="knowledge-section">
            <div class="sidebar-section-header">
                <h2>Base de Conocimiento</h2>
                <button class="refresh-btn" id="refresh-docs-btn" title="Recargar lista de documentos">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
            </div>
            <div class="scroll-area">
                <div id="upload-area" style="margin-bottom: 15px;">
                    <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt,.md,.html" style="display: none;" />
                    <button id="upload-btn"
                        style="width: 100%; padding: 10px; background: white; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                            stroke-linecap="round" stroke-linejoin="round" height="16" width="16"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Subir Documento
                    </button>
                    <div id="upload-status"></div>
                </div>
                <div id="documents-list">
                    <p style="color: var(--text-secondary); text-align: center; padding: 20px; font-size: 13px;">
                        No hay documentos cargados
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div id="main">
        <div id="chat-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button id="sidebar-toggle" title="Ocultar/Mostrar panel lateral"
                    style="color: var(--text-secondary); background: transparent; border: none; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center;">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="22" width="22" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </button>
                <h1>Asistente Contextual</h1>
            </div>
            <div id="connection-status" class="disconnected">
                <div class="status-dot"></div>
                <span id="status-text">Desconectado</span>
            </div>
            <button id="logout-btn" title="Cerrar sesión"
                style="background:transparent;border:none;cursor:pointer;color:var(--text-secondary);font-size:13px;padding:6px 10px;border-radius:4px;transition:background 0.2s;margin-left:12px;white-space:nowrap;"
                onmouseover="this.style.background='var(--border-color)'" onmouseout="this.style.background='transparent'">
                ← Salir
            </button>
        </div>

        <div id="chat"></div>

        <div id="typing-container" style="padding: 0 30px 10px; display: flex; width: 100%;">
            <div id="typing-indicator" class="typing-indicator">
                <div class="typing-dots"><span></span><span></span><span></span></div>
                Asistente está escribiendo...
            </div>
        </div>

        <div id="input-container">
            <div id="input-box">
                <!--
                    U5: textarea en lugar de <input type="text">.
                    Crece automáticamente con el contenido vía JS (autoResize).
                    A4: Los event listeners se registran desde JS, no como atributos inline.
                -->
                <textarea id="msg"
                    placeholder="Envía un mensaje al asistente... (Enter para enviar, Shift+Enter para nueva línea)"
                    rows="1" autocomplete="off"></textarea>
                <button id="send-btn" title="Enviar mensaje">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20" height="1em"
                        width="1em" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z">
                        </path>
                    </svg>
                </button>
            </div>
            <!-- U6: Contador de caracteres -->
            <div id="char-counter"></div>
        </div>
    </div>

    <!-- Modal de confirmación -->
    <div id="custom-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-description"></p>
            <div class="modal-buttons">
                <button id="modal-cancel" class="btn-cancel">Cancelar</button>
                <button id="modal-confirm" class="btn-confirm">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- Modal de entrada de texto (renombrar) -->
    <div id="input-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2 id="input-modal-title"></h2>
            <p id="input-modal-description"></p>
            <input id="input-modal-field"
                style="width:100%;margin-top:14px;padding:10px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;box-sizing:border-box;"
                type="text" />
            <div class="modal-buttons">
                <button id="input-modal-cancel" class="btn-cancel">Cancelar</button>
                <button id="input-modal-confirm" class="btn-confirm">Guardar</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        /*
         * A1: Todo el código de aplicación encapsulado en un IIFE (Immediately Invoked
         * Function Expression). Esto elimina todas las variables globales sueltas
         * (socket, chat, statusText, etc.) y previene colisiones con scripts futuros.
         * Las funciones que deben ser accesibles desde el HTML (p.ej. onclick) se
         * exponen explícitamente en window.App al final del IIFE.
         */
        (function () {
            'use strict';

            // =====================================================================
            // ESTADO DE LA APLICACIÓN (A1: centralizado, no variables globales)
            // =====================================================================
            const App = {
                socket: null,
                idSesionActual: null,
                enviando: false,   // A2: bloquea doble envío
                cierreIntencional: false,   // B2: distingue cierre intencional vs. error
                intervalos: [],      // B3: guarda refs para limpiarlas si fuera necesario
                MAX_CHARS: 4000,
                cargandoChats: false,
                authCompleted: false  // JWT: bloquea mensajes de chat hasta auth_success
            };

            // =====================================================================
            // REFERENCIAS AL DOM (B7: una sola referencia por elemento, reutilizada)
            // =====================================================================
            const DOM = {
                chat: document.getElementById('chat'),
                msgInput: document.getElementById('msg'),
                sendBtn: document.getElementById('send-btn'),
                statusText: document.getElementById('status-text'),
                connStatus: document.getElementById('connection-status'),
                typingIndicator: document.getElementById('typing-indicator'),
                chatList: document.getElementById('chat-list'),
                documentsList: document.getElementById('documents-list'),
                uploadStatus: document.getElementById('upload-status'),
                fileInput: document.getElementById('file-input'),
                charCounter: document.getElementById('char-counter'),
                sidebar: document.getElementById('sidebar'),
            };

            // =====================================================================
            // UTILIDADES
            // =====================================================================

            /**
             * B1 / S1: Escapa texto arbitrario para inserción segura en HTML.
             * Previene XSS cuando se muestran datos provenientes del servidor
             * (nombres de archivos, títulos de chat, etc.) dentro de innerHTML.
             */
            function escHTML(str) {
                if (!str) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            /**
             * Limpia etiquetas <thinking> del texto del asistente antes de mostrarlo.
             */
            function limpiarRespuesta(texto) {
                if (!texto) return '';
                return texto.replace(/<thinking>[\s\S]*?<\/thinking>/g, '').trim();
            }

            /**
             * U7: Persiste el estado del sidebar en localStorage.
             */
            function guardarEstadoSidebar(collapsed) {
                try { localStorage.setItem('sidebar_collapsed', collapsed ? '1' : '0'); } catch (_) { }
            }

            function recuperarEstadoSidebar() {
                try { return localStorage.getItem('sidebar_collapsed') === '1'; } catch (_) { return false; }
            }

            function formatBytes(bytes) {
                if (!bytes) return '0 B';
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            // =====================================================================
            // SISTEMA DE TOASTS
            // =====================================================================
            function mostrarToast(mensaje, tipo = 'error', duracion = 3500) {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${tipo}`;
                const iconos = { success: '✓', error: '✕', info: 'ℹ' };
                // escHTML aquí también para que el mensaje del toast sea seguro
                toast.innerHTML = `<span style="font-size:15px;">${iconos[tipo] || '!'}</span><span>${escHTML(mensaje)}</span>`;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.animation = 'toast-out 0.25s ease forwards';
                    setTimeout(() => toast.remove(), 260);
                }, duracion);
            }

            // =====================================================================
            // SISTEMA DE MODALES
            // =====================================================================
            function confirmarAccion(titulo, desc, callback) {
                const modal = document.getElementById('custom-modal');
                const btnConf = document.getElementById('modal-confirm');
                const btnCanc = document.getElementById('modal-cancel');

                // B1: textContent en lugar de innerHTML — seguro contra XSS
                document.getElementById('modal-title').textContent = titulo;
                document.getElementById('modal-description').textContent = desc;

                const cleanup = () => {
                    modal.style.display = 'none';
                    btnConf.onclick = null;
                    btnCanc.onclick = null;
                };

                btnCanc.onclick = () => cleanup();
                btnConf.onclick = () => { cleanup(); callback(); };
                modal.style.display = 'flex';
            }

            function pedirTexto(titulo, descripcion, valorInicial, callback) {
                const modal = document.getElementById('input-modal');
                const campo = document.getElementById('input-modal-field');
                const btnConf = document.getElementById('input-modal-confirm');
                const btnCanc = document.getElementById('input-modal-cancel');

                // B1: textContent en lugar de innerHTML
                document.getElementById('input-modal-title').textContent = titulo;
                document.getElementById('input-modal-description').textContent = descripcion;
                campo.value = valorInicial || '';

                const cleanup = () => {
                    modal.style.display = 'none';
                    btnConf.onclick = null;
                    btnCanc.onclick = null;
                    campo.onkeydown = null;
                };

                btnCanc.onclick = () => cleanup();
                btnConf.onclick = () => {
                    const valor = campo.value.trim();
                    cleanup();
                    if (valor) callback(valor);
                };
                campo.onkeydown = (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); btnConf.click(); }
                    if (e.key === 'Escape') { cleanup(); }
                };

                modal.style.display = 'flex';
                setTimeout(() => campo.focus(), 50);
            }

            // =====================================================================
            // MENSAJES EN EL CHAT
            // =====================================================================
            function scrollToBottom() {
                DOM.chat.scrollTop = DOM.chat.scrollHeight;
            }

            function log(sender, message, type) {
                const row = document.createElement('div');
                row.className = 'message-row';
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';

                if (type === 'user') {
                    row.classList.add('user-row');
                    bubble.classList.add('user-bubble');
                    // B1: textContent para mensajes del usuario — nunca innerHTML con input del usuario
                    bubble.textContent = message;

                } else if (type === 'assistant') {
                    row.classList.add('ai-row');
                    bubble.classList.add('ai-bubble');
                    /*
                     * S2: DOMPurify.sanitize() aplicado ANTES de insertar el HTML
                     * generado por marked.parse(). Esto bloquea <script>, <img onerror=...>
                     * y cualquier vector XSS que el LLM pudiera devolver incrustado
                     * en su respuesta Markdown.
                     */
                    const htmlBruto = marked.parse(message);
                    bubble.innerHTML = DOMPurify.sanitize(htmlBruto);

                } else if (type === 'system') {
                    row.style.justifyContent = 'center';
                    bubble.className = 'system-bubble';
                    bubble.textContent = message;

                } else if (type === 'error') {
                    row.style.justifyContent = 'center';
                    bubble.className = 'system-bubble error-bubble';
                    bubble.textContent = message;
                }

                row.appendChild(bubble);
                DOM.chat.appendChild(row);
                scrollToBottom();
            }

            function showTyping() {
                DOM.typingIndicator.style.display = 'flex';
                scrollToBottom();
            }

            function hideTyping() {
                DOM.typingIndicator.style.display = 'none';
            }

            // =====================================================================
            // WEBSOCKET
            // =====================================================================
            function connectWebSocket(idSesion) {
                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                App.authCompleted = false; // Reset para cada nueva conexión
                App.socket = new WebSocket(`${protocol}//${location.host}/chat/${idSesion}`);

                App.socket.onopen = () => {
                    DOM.statusText.textContent = 'Autenticando...';
                    DOM.connStatus.className = 'disconnected'; // naranja hasta auth_success
                };

                App.socket.onmessage = (event) => {
                    // --- Manejo de frames de protocolo JWT ---
                    try {
                        const frame = JSON.parse(event.data);

                        // Fase 1: El servidor pide autenticación
                        if (frame.type === 'auth_required') {
                            const token = sessionStorage.getItem('jwt_token');
                            if (!token) {
                                // Sin token: redirigir al login
                                window.location.href = 'index.html?error=session_expired';
                                return;
                            }
                            // Enviar token como primer mensaje
                            App.socket.send('AUTH:' + token);
                            return;
                        }

                        // Fase 2: Autenticación exitosa
                        if (frame.type === 'auth_success') {
                            App.authCompleted = true;
                            DOM.statusText.textContent = 'Conectado';
                            DOM.connStatus.className = 'connected';
                            setEnviando(false);
                            return;
                        }

                        // Fase 2: Autenticación fallida
                        if (frame.type === 'auth_failed') {
                            sessionStorage.removeItem('jwt_token');
                            sessionStorage.removeItem('jwt_nombreUsuario');
                            window.location.href = 'index.html?error=session_expired';
                            return;
                        }

                        // Frame legacy (session_ready) — ignorar
                        if (frame.type === 'session_ready') return;

                        // Frame de error genérico del servidor
                        if (frame.type === 'error') {
                            hideTyping();
                            setEnviando(false);
                            log('Sistema', frame.reason || 'Error del servidor.', 'error');
                            return;
                        }
                    } catch (_) { /* respuesta normal del asistente (no es JSON) */ }

                    // --- Mensajes normales de chat (solo si autenticado) ---
                    if (!App.authCompleted) return;

                    hideTyping();
                    setEnviando(false); // A2: re-habilita el input al recibir respuesta

                    const textoLimpio = limpiarRespuesta(event.data);
                    log('Asistente', textoLimpio || 'Procesando...', 'assistant');
                    cargarListaChats();
                };

                App.socket.onclose = (event) => {
                    DOM.statusText.textContent = 'Desconectado';
                    DOM.connStatus.className = 'disconnected';
                    // Cierre con código 4001 = auth fallida
                    if (event.code === 4001) {
                        sessionStorage.removeItem('jwt_token');
                        sessionStorage.removeItem('jwt_nombreUsuario');
                        window.location.href = 'index.html?error=session_expired';
                        return;
                    }
                    // B2: solo muestra error si el cierre NO fue intencional
                    if (!App.cierreIntencional) {
                        log('Sistema', 'Conexión cerrada inesperadamente.', 'error');
                    }
                    App.cierreIntencional = false; // reset del flag
                };

                App.socket.onerror = () => {
                    log('Sistema', 'Error de conexión.', 'error');
                    hideTyping();
                    setEnviando(false);
                };
            }

            // =====================================================================
            // A2: GESTIÓN DEL ESTADO "ENVIANDO"
            // =====================================================================
            function setEnviando(estado) {
                App.enviando = estado;
                DOM.sendBtn.disabled = estado;
                DOM.msgInput.disabled = estado;
            }

            // =====================================================================
            // ENVÍO DE MENSAJES
            // =====================================================================
            function send() {
                const text = DOM.msgInput.value.trim();

                // B6: Bloqueo de doble envío — si ya está enviando, no hace nada
                if (!text || App.enviando) return;

                if (App.socket && App.socket.readyState === WebSocket.OPEN) {
                    App.socket.send(text);
                    log('Usuario', text, 'user');
                    DOM.msgInput.value = '';
                    autoResize(DOM.msgInput); // resetea la altura del textarea
                    actualizarContador();
                    setEnviando(true);        // A2: deshabilita input hasta recibir respuesta
                    showTyping();
                } else {
                    log('Sistema', 'No hay conexión activa. Iniciando nueva...', 'error');
                    crearNuevoChat();
                }
            }

            // =====================================================================
            // U5: AUTO-RESIZE DEL TEXTAREA
            // =====================================================================
            function autoResize(el) {
                el.style.height = 'auto';
                el.style.height = Math.min(el.scrollHeight, 160) + 'px';
            }

            // =====================================================================
            // U6: CONTADOR DE CARACTERES
            // =====================================================================
            function actualizarContador() {
                const len = DOM.msgInput.value.length;
                if (len === 0) {
                    DOM.charCounter.textContent = '';
                    DOM.charCounter.className = '';
                    return;
                }
                DOM.charCounter.textContent = `${len} / ${App.MAX_CHARS}`;
                if (len > App.MAX_CHARS * 0.95) {
                    DOM.charCounter.className = 'danger';
                } else if (len > App.MAX_CHARS * 0.80) {
                    DOM.charCounter.className = 'warning';
                } else {
                    DOM.charCounter.className = '';
                }
            }

            // =====================================================================
            // GESTIÓN DE CHATS
            // =====================================================================
            async function crearNuevoChat() {
                App.idSesionActual = crypto.randomUUID();
                DOM.chat.innerHTML = '';
                log('Sistema', 'Nueva conversación iniciada.', 'system');

                // B2: marcamos el cierre como intencional ANTES de llamar a close()
                if (App.socket) {
                    App.cierreIntencional = true;
                    App.socket.close();
                }
                connectWebSocket(App.idSesionActual);
            }

            async function cargarListaChats() {
                if (App.cargandoChats) return;
                App.cargandoChats = true;
                if (!DOM.chatList) return;
                try {
                    const token = localStorage.getItem('jwt_token');

                    const response = await fetch('/api/chats', {
                        headers: { 'Authorization': 'Bearer ' + sessionStorage.getItem('jwt_token') }
                    });

                    if (!response.ok) throw new Error('Error cargando chats: ' + response.status);
                    const sesiones = await response.json();

                    DOM.chatList.innerHTML = '';

                    if (sesiones.length === 0) {
                        DOM.chatList.innerHTML = '<p style="color: var(--text-secondary); text-align: center; font-size: 13px;">Sin chats previos</p>';
                        return;
                    }

                    sesiones.forEach(sesion => {
                        const item = document.createElement('li');
                        item.className = 'chat-item';
                        if (App.idSesionActual === sesion.sessionId) item.classList.add('active');

                        const fecha = new Date(sesion.updatedAt);
                        const fechaFormateada = fecha.toLocaleString();
                        /*
                         * B1/S1: escHTML() en todos los valores del servidor antes de
                         * interpolarlos en innerHTML. Previene XSS si un título contiene
                         * caracteres especiales HTML o scripts.
                         *
                         * B4: los callbacks de renombrar/borrar se registran vía addEventListener
                         * en lugar de atributos onclick con strings interpoladas.
                         * Esto elimina el problema de las comillas simples rotas.
                         */
                        const tituloSafe = escHTML(sesion.titulo || 'Sin nombre');
                        const fechaSafe = escHTML(fechaFormateada);

                        item.innerHTML = `
                                            <div class="chat-info" style="flex: 1; display: flex; align-items: center; gap: 10px; overflow: hidden; cursor: pointer;">
                                                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="18" width="18" xmlns="http://www.w3.org/2000/svg">
                                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                                </svg>
                                                <div style="display: flex; flex-direction: column; overflow: hidden;">
                                                    <span class="chat-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500;">${tituloSafe}</span>
                                                    <span class="chat-meta"  style="font-size: 11px; color: var(--text-secondary);">${fechaSafe}</span>
                                                </div>
                                            </div>
                                            <div class="chat-actions" style="display: flex; gap: 5px; opacity: 0.7;">
                                                <button class="btn-rename" title="Renombrar" style="background: none; border: none; cursor: pointer; padding: 4px;">✏️</button>
                                                <button class="btn-delete" title="Borrar"    style="background: none; border: none; cursor: pointer; padding: 4px;">🗑️</button>
                                            </div>
                                        `;

                        // B4: event listeners en lugar de onclick inline con strings interpoladas
                        item.querySelector('.chat-info').addEventListener('click', () =>
                            cargarHistorialChat(sesion.sessionId));
                        item.querySelector('.btn-rename').addEventListener('click', (e) => {
                            e.stopPropagation();
                            // B4: el título real (sin escaping) va al modal de edición
                            renombrarChat(sesion.sessionId, sesion.titulo || 'Sin nombre');
                        });
                        const sessionIdCopia = String(sesion.sessionId);
                        item.querySelector('.btn-delete').addEventListener('click', (e) => {
                            e.stopPropagation();
                            borrarChat(sesion.sessionId);
                        });

                        DOM.chatList.appendChild(item);
                    });
                } catch (error) {
                    console.error('Error en cargarListaChats:', error);
                } finally {
                    App.cargandoChats = false;
                }
            }

            async function renombrarChat(id, tituloActual) {
                pedirTexto(
                    'Renombrar conversación',
                    'Introduce el nuevo nombre para esta conversación:',
                    tituloActual,
                    async (nuevoTitulo) => {
                        if (nuevoTitulo === tituloActual) return;
                        try {
                            const response = await fetch(`/api/chats/${id}/titulo`, {
                                method: 'PUT',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': 'Bearer ' + sessionStorage.getItem('jwt_token')
                                },
                                body: JSON.stringify(nuevoTitulo)
                            });
                            if (response.ok) {
                                mostrarToast('Conversación renombrada.', 'success');
                                cargarListaChats();
                            } else {
                                mostrarToast('No se pudo renombrar la conversación.', 'error');
                            }
                        } catch (error) {
                            console.error('Error en renombrarChat:', error);
                            mostrarToast('Error de red al renombrar.', 'error');
                        }
                    }
                );
            }

            async function borrarChat(id) {
                confirmarAccion(
                    'Eliminar conversación',
                    '¿Estás seguro de que deseas eliminar esta conversación? Esta acción no se puede deshacer.',
                    async () => {
                        try {
                            const response = await fetch(`/api/chats/${id}`, {
                                method: 'DELETE',
                                headers: { 'Authorization': 'Bearer ' + sessionStorage.getItem('jwt_token') }
                            });
                            if (response.ok || response.status === 204) {
                                mostrarToast('Conversación eliminada.', 'success');
                                cargarListaChats();
                                if (id === App.idSesionActual) {
                                    // ANTES: crearNuevoChat() directo — contaminaba el contexto CDI
                                    // del DELETE porque el hilo Vert.x reutilizaba el RequestContext
                                    // activo al abrir el nuevo WebSocket inmediatamente.
                                    // AHORA: setTimeout(0) cede el hilo al event loop, el RequestContext
                                    // del DELETE se libera, y crearNuevoChat se ejecuta en contexto limpio.
                                    setTimeout(() => crearNuevoChat(), 0);
                                }
                            } else {
                                mostrarToast('No se pudo eliminar la conversación.', 'error');
                            }
                        } catch (error) {
                            console.error('Error en borrarChat:', error);
                            mostrarToast('Error de red al eliminar la conversación.', 'error');
                        }
                    }
                );
            }

            async function cargarHistorialChat(id) {
                // B5: Deshabilitar input durante la carga del historial
                setEnviando(true);

                // U1: Indicador de carga mientras llega el historial
                DOM.chat.innerHTML = `
                                        <div class="historial-loading">
                                            <div class="spinner"></div>
                                            <span>Cargando historial...</span>
                                        </div>`;

                try {
                    // Recuperar el token del almacenamiento (ajusta 'jwt_token' a tu clave real)
                    const token = sessionStorage.getItem('jwt_token');

                    // INYECCIÓN DEL TOKEN JWT AQUÍ
                    const res = await fetch(`/api/chats/${id}/historial`, {
                        method: 'GET',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (!res.ok) {
                        throw new Error(`Error HTTP: ${res.status} - ${res.statusText}`);
                    }

                    const history = await res.json();

                    App.idSesionActual = id;
                    DOM.chat.innerHTML = '';

                    history.forEach(msg => {
                        if (msg.type === 'SYSTEM') return;

                        let texto = msg.text || (msg.contents && msg.contents[0] ? msg.contents[0].text : '');
                        if (!texto || texto === 'null') return;

                        if (msg.type === 'USER') {
                            const delimitadores = [
                                'Utiliza los fragmentos', '--- Instrucciones',
                                'Responde EXCLUSIVAMENTE', 'content:', '\n\nContexto:'
                            ];
                            delimitadores.forEach(d => {
                                if (texto.includes(d)) texto = texto.split(d)[0].trim();
                            });
                            log('Usuario', texto, 'user');
                        } else {
                            texto = limpiarRespuesta(texto);
                            log('Asistente', texto || 'Procesando...', 'assistant');
                        }
                    });

                    // B2: cierre intencional antes de abrir nuevo socket
                    if (App.socket) {
                        App.cierreIntencional = true;
                        App.socket.close();
                    }
                    connectWebSocket(id);
                    log('Sistema', 'Historial de conversación recuperado.', 'system');

                } catch (e) {
                    console.error("Fallo de red o autorización al cargar historial:", e);
                    DOM.chat.innerHTML = '';
                    log('Sistema', 'Error al recuperar el historial. Verifica tu sesión.', 'error');
                } finally {
                    // B5: re-habilitar input siempre, aunque haya fallado la carga
                    setEnviando(false);
                }
            }

            // =====================================================================
            // GESTIÓN DE DOCUMENTOS
            // =====================================================================
            async function cargarDocumentos() {
                try {
                    const token = sessionStorage.getItem("jwt_token");

                    const response = await fetch('/api/documentos', {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/json'
                        }
                    });

                    if (!response.ok) {
                        if (response.status === 401 || response.status === 403) {
                            console.error('Acceso denegado. El token ha expirado o no es válido.');
                        }
                        throw new Error('HTTP ' + response.status);
                    }

                    const documentos = await response.json();

                    if (!documentos || documentos.length === 0) {
                        DOM.documentsList.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px; font-size: 13px;">No hay documentos cargados</p>';
                        return;
                    }

                    DOM.documentsList.innerHTML = '';

                    documentos.forEach(doc => {
                        const item = document.createElement('div');
                        item.className = 'document-item';

                        const cleanName = typeof doc === 'string' ? doc : (doc.nombre || doc.fileName || doc.id || 'Documento');
                        let tipoDoc = 'DOC';

                        if (typeof doc === 'object' && (doc.tipo || doc.contentType || doc.mimeType)) {
                            const mime = doc.tipo || doc.contentType || doc.mimeType;
                            tipoDoc = mime.split('/').pop().toUpperCase();
                            if (tipoDoc.includes('WORDPROCESSINGML')) tipoDoc = 'DOCX';
                        } else if (cleanName.includes('.')) {
                            tipoDoc = cleanName.split('.').pop().toUpperCase();
                        }

                        const docSize = typeof doc === 'string' ? 0 : (doc.tamanio_bytes || doc.size || doc.sizeBytes || 0);

                        item.innerHTML = `
                <div class="doc-info" title="${escHTML(cleanName)}">
                    <div class="name">${escHTML(cleanName)}</div>
                    <div class="meta">${escHTML(tipoDoc)} • ${escHTML(formatBytes(docSize))}</div>
                </div>
                <button class="delete-btn" title="Eliminar documento">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            `;

                        item.querySelector('.delete-btn').addEventListener('click', () =>
                            borrarDocumento(cleanName));

                        DOM.documentsList.appendChild(item);
                    });
                } catch (error) {
                    console.error('Error cargando documentos:', error);
                    DOM.documentsList.innerHTML = '<p style="color: var(--danger-color); text-align: center; padding: 20px; font-size: 13px;">Error al cargar documentos</p>';
                }
            }

            async function borrarDocumento(fileName) {
                confirmarAccion(
                    'Eliminar documento',
                    `¿Estás seguro de que deseas eliminar el documento "${fileName}"? Esta acción no se puede deshacer.`,
                    async () => {
                        try {
                            const token = sessionStorage.getItem("jwt_token");
                            const response = await fetch('/api/documentos/' + encodeURIComponent(fileName), {
                                method: 'DELETE',
                                headers: {
                                    'Authorization': `Bearer ${token}`
                                }
                            });

                            if (response.ok || response.status === 204) {
                                mostrarToast(`Documento eliminado.`, 'success');
                                cargarDocumentos();
                            } else {
                                mostrarToast('No se pudo eliminar el documento.', 'error');
                            }
                        } catch (error) {
                            console.error('Error al eliminar documento:', error);
                            mostrarToast('Error de red al intentar eliminar.', 'error');
                        }
                    }
                );
            }

            // =====================================================================
            // SIDEBAR
            // =====================================================================
            function toggleSidebar() {
                const collapsed = DOM.sidebar.classList.toggle('collapsed');
                guardarEstadoSidebar(collapsed); // U7: persiste estado
            }

            // =====================================================================
            // UPLOAD DE DOCUMENTOS
            // =====================================================================
            async function manejarSubidaArchivo(file) {
                if (!file) return;

                DOM.uploadStatus.innerHTML = '<div class="spinner"></div> Subiendo...';

                const formData = new FormData();
                formData.append('file', file);
                formData.append('metadatos', JSON.stringify({
                    autor: 'Usuario',
                    fecha: new Date().toISOString()
                }));

                try {
                    const token = sessionStorage.getItem("jwt_token");
                    const response = await fetch('/api/documentos/upload', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });

                    if (response.ok) {
                        DOM.uploadStatus.innerHTML = "<span style='color: var(--primary-color)'>Subido correctamente</span>";
                        cargarDocumentos();
                        mostrarToast('Documento subido correctamente.', 'success');
                    } else {
                        const error = await response.json();
                        DOM.uploadStatus.innerHTML = `<span style='color: var(--danger-color)'>Error: ${escHTML(error.error || 'desconocido')}</span>`;
                    }
                } catch (error) {
                    DOM.uploadStatus.innerHTML = "<span style='color: var(--danger-color)'>Error de conexión</span>";
                }

                setTimeout(() => { DOM.uploadStatus.innerHTML = ''; }, 3000);
            }

            // =====================================================================
            // REGISTRO DE EVENT LISTENERS (A4: todo desde JS, nada inline en HTML)
            // =====================================================================
            function registrarEventos() {
                // Nuevo chat
                document.getElementById('new-chat-btn').addEventListener('click', crearNuevoChat);

                // Sidebar toggle
                document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);

                // Cerrar sesión
                document.getElementById('logout-btn').addEventListener('click', () => {
                    if (App.socket) {
                        App.cierreIntencional = true;
                        App.socket.close();
                    }
                    sessionStorage.removeItem('jwt_token');
                    sessionStorage.removeItem('jwt_nombreUsuario');
                    window.location.href = 'index.html';
                });

                // Recargar documentos
                document.getElementById('refresh-docs-btn').addEventListener('click', cargarDocumentos);

                // Subir documento
                document.getElementById('upload-btn').addEventListener('click', () => DOM.fileInput.click());
                DOM.fileInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    await manejarSubidaArchivo(file);
                    e.target.value = ''; // reset del input
                });

                // Envío de mensaje
                document.getElementById('send-btn').addEventListener('click', send);

                /*
                 * A4: El listener del textarea se registra aquí, no como onkeypress en el HTML.
                 * U5: Enter envía, Shift+Enter inserta salto de línea (comportamiento esperado).
                 * B6: App.enviando actúa como debounce — send() no hace nada si ya está enviando.
                 */
                DOM.msgInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        send();
                    }
                });

                // U5: Auto-resize del textarea
                DOM.msgInput.addEventListener('input', () => {
                    autoResize(DOM.msgInput);
                    actualizarContador(); // U6
                });

                /*
                 * U3: Shortcut global Ctrl+N (o Cmd+N en Mac) para nuevo chat.
                 * Previene la apertura de una nueva pestaña del navegador.
                 */
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                        e.preventDefault();
                        crearNuevoChat();
                    }
                });
            }

            // =====================================================================
            // INICIALIZACIÓN
            // =====================================================================
            window.addEventListener('load', () => {
                // Guard de sesión: si no hay token, redirigir al login
                if (!sessionStorage.getItem('jwt_token')) {
                    window.location.href = 'index.html';
                    return;
                }

                // Configurar marked.js
                marked.setOptions({ breaks: true, gfm: true });

                // U7: Restaurar estado del sidebar desde localStorage
                if (recuperarEstadoSidebar()) {
                    DOM.sidebar.classList.add('collapsed');
                }

                registrarEventos();
                cargarDocumentos();
                cargarListaChats();

                if (!App.idSesionActual) crearNuevoChat();

                /*
                 * B3: Las referencias de setInterval se guardan en App.intervalos
                 * para poder limpiarlas con clearInterval si fuera necesario.
                 * Los intervalos se mantienen iguales al original para no alterar comportamiento.
                 */
                App.intervalos.push(setInterval(cargarDocumentos, 30000));
                App.intervalos.push(setInterval(cargarListaChats, 10000));

                DOM.msgInput.focus();
            });

        })(); // fin del IIFE
    </script>
</body>

</html>
