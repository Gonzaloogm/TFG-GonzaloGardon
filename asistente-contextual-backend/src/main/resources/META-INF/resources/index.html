<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Chat Asistente Contextual</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        #input-area {
            display: flex;
            padding: 10px;
        }

        #msg {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
        }

        .message {
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            max-width: 70%;
        }

        .user {
            background-color: #e3f2fd;
            align-self: flex-end;
            margin-left: auto;
        }

        .assistant {
            background-color: #f1f1f1;
            align-self: flex-start;
            margin-right: auto;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="msg" placeholder="Escribe tu mensaje..." onkeypress="if(event.key === 'Enter') send()">
        <button onclick="send()">Enviar</button>
    </div>

    <script>
        var socket = new WebSocket("ws://" + location.host + "/chat");
        var chat = document.getElementById("chat");

        socket.onopen = function () {
            log("Sistema", "Conectado al servidor de chat.", "system");
        };

        socket.onmessage = function (event) {
            log("Asistente", event.data, "assistant");
        };

        socket.onclose = function () {
            log("Sistema", "Desconectado del servidor.", "error");
        };

        function send() {
            var msgInput = document.getElementById("msg");
            var text = msgInput.value;
            if (text.trim() !== "") {
                socket.send(text);
                log("Tú", text, "user");
                msgInput.value = "";
            }
        }

        function log(sender, message, type) {
            var div = document.createElement("div");
            div.className = "message " + type;
            div.innerHTML = "<strong>" + sender + ":</strong> " + message;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>

</html>
