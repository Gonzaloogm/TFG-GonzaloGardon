<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Contextual - TFG</title>
    <style>
        *
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body
        {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            height: 100vh;
            background: #f5f5f5;
        }

        /* Sidebar para documentos */
        #sidebar
        {
            width: 300px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #sidebar-header
        {
            padding: 20px;
            background: #1976d2;
            color: white;
        }

        #sidebar-header h2
        {
            font-size: 18px;
            margin-bottom: 10px;
        }

        #upload-area
        {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        #file-input
        {
            display: none;
        }

        #upload-btn
        {
            width: 100%;
            padding: 10px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        #upload-btn:hover
        {
            background: #1565c0;
        }

        #upload-status
        {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        #documents-list
        {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .document-item
        {
            padding: 10px;
            margin: 5px 0;
            background: #f9f9f9;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .document-item:hover
        {
            background: #e3f2fd;
        }

        .document-item .name
        {
            font-weight: 500;
            margin-bottom: 5px;
        }

        .document-item .meta
        {
            font-size: 11px;
            color: #666;
        }

        /* Chat area */
        #main
        {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chat-header
        {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        #chat-header h1
        {
            font-size: 24px;
            color: #333;
        }

        #connection-status
        {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        #connection-status.connected
        {
            color: #4caf50;
        }

        #connection-status.disconnected
        {
            color: #f44336;
        }

        #chat
        {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        #input-area
        {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            gap: 10px;
        }

        #msg
        {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        #msg:focus
        {
            outline: none;
            border-color: #1976d2;
        }

        #send-btn
        {
            padding: 12px 30px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        #send-btn:hover
        {
            background: #1565c0;
        }

        .message
        {
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 8px;
            max-width: 70%;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn
        {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user
        {
            background: #1976d2;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .message.assistant
        {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            margin-right: auto;
            border-bottom-left-radius: 2px;
        }

        .message.system
        {
            background: #fff3cd;
            color: #856404;
            text-align: center;
            max-width: 100%;
            font-size: 13px;
        }

        .message.error
        {
            background: #f8d7da;
            color: #721c24;
            text-align: center;
            max-width: 100%;
        }

        .message strong
        {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            opacity: 0.8;
        }

        /* Loading spinner */
        .loading
        {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #1976d2;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin
        {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
<!-- Sidebar de documentos -->
<div id="sidebar">
    <div id="sidebar-header">
        <h2>Documentos</h2>
        <p style="font-size: 12px; opacity: 0.9;">Base de conocimiento</p>
    </div>

    <div id="upload-area">
        <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt" />
        <button id="upload-btn" onclick="triggerFileInput()">
             Subir Documento
        </button>
        <div id="upload-status"></div>
    </div>

    <div id="documents-list">
        <p style="color: #999; text-align: center; padding: 20px; font-size: 13px;">
            No hay documentos cargados
        </p>
    </div>
</div>

<!-- Chat principal -->
<div id="main">
    <div id="chat-header">
        <h1>Asistente Contextual</h1>
        <div id="connection-status" class="disconnected">
             Desconectado
        </div>
    </div>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text"
               id="msg"
               placeholder="Escribe tu consulta..."
               onkeypress="if(event.key === 'Enter') send()">
        <button id="send-btn" onclick="send()">Enviar</button>
    </div>
</div>

<script>
    // ========== WebSocket para Chat ==========
    var socket;
    var chat = document.getElementById("chat");
    var connectionStatus = document.getElementById("connection-status");

    function connectWebSocket()
    {
        socket = new WebSocket("ws://" + location.host + "/chat");

        socket.onopen = function ()
        {
            connectionStatus.textContent = "Conectado";
            connectionStatus.className = "connected";
            log("Sistema", "Conectado al servidor de chat.", "system");
        };

        socket.onmessage = function (event)
        {
            log("Asistente", event.data, "assistant");
        };

        socket.onclose = function ()
        {
            connectionStatus.textContent = "Desconectado";
            connectionStatus.className = "disconnected";
            log("Sistema", "Desconectado del servidor.", "error");

            // Intentar reconectar después de 3 segundos
            setTimeout(connectWebSocket, 3000);
        };

        socket.onerror = function(error)
        {
            log("Sistema", "Error de conexión.", "error");
        };
    }

    function send()
    {
        var msgInput = document.getElementById("msg");
        var text = msgInput.value.trim();

        if (text !== "" && socket.readyState === WebSocket.OPEN)
        {
            socket.send(text);
            log("Tú", text, "user");
            msgInput.value = "";
        } else if (socket.readyState !== WebSocket.OPEN)
        {
            log("Sistema", "No hay conexión con el servidor.", "error");
        }
    }

    function log(sender, message, type)
    {
        var div = document.createElement("div");
        div.className = "message " + type;

        if (type === "system" || type === "error")
        {
            div.textContent = message;
        } else
        {
            div.innerHTML = "<strong>" + sender + "</strong>" + message;
        }

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    // ========== Gestión de Documentos ==========
    function triggerFileInput()
    {
        document.getElementById("file-input").click();
    }

    document.getElementById("file-input").addEventListener("change", async function(e)
    {
        var file = e.target.files[0];
        if (!file) return;

        var uploadStatus = document.getElementById("upload-status");
        uploadStatus.innerHTML = '<div class="loading"></div> Subiendo...';

        var formData = new FormData();
        formData.append("file", file);

        // Metadatos opcionales
        var metadatos =
            {
            "autor": "Usuario",
            "fecha": new Date().toISOString()
        };
        formData.append("metadatos", JSON.stringify(metadatos));

        try
        {
            var response = await fetch("/api/documentos/upload",
                {
                method: "POST",
                body: formData
            });

            if (response.ok)
            {
                var documento = await response.json();
                uploadStatus.innerHTML = "Subido correctamente";
                log("Sistema", `Documento "${file.name}" procesado exitosamente`, "system");

                // Recargar lista de documentos
                cargarDocumentos();

                // Limpiar input
                e.target.value = "";
            } else
            {
                var error = await response.json();
                uploadStatus.innerHTML = "Error: " + error.error;
            }
        } catch (error)
        {
            uploadStatus.innerHTML = "Error de conexión";
            log("Sistema", "Error subiendo documento: " + error.message, "error");
        }

        // Limpiar mensaje después de 3 segundos
        setTimeout(() =>
        {
            uploadStatus.innerHTML = "";
        }, 3000);
    });

    async function cargarDocumentos()
    {
        try
        {
            var response = await fetch("/api/documentos");
            var documentos = await response.json();

            var list = document.getElementById("documents-list");

            if (documentos.length === 0)
            {
                list.innerHTML = '<p style="color: #999; text-align: center; padding: 20px; font-size: 13px;">No hay documentos cargados</p>';
                return;
            }

            list.innerHTML = "";

            documentos.forEach(doc =>
            {
                var item = document.createElement("div");
                item.className = "document-item";
                item.innerHTML = `
                        <div class="name"> ${doc.nombre}</div>
                        <div class="meta">
                            ${doc.tipo} • ${formatBytes(doc.tamanio_bytes)}
                        </div>
                    `;
                item.onclick = () => mostrarDocumento(doc);
                list.appendChild(item);
            });
        } catch (error) {
            console.error("Error cargando documentos:", error);
        }
    }

    function mostrarDocumento(doc)
    {
        log("Sistema", `Documento: ${doc.nombre} (${doc.tipo})`, "system");
    }

    function formatBytes(bytes)
    {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    //Inicialización
    window.onload = function()
    {
        connectWebSocket();
        cargarDocumentos();

        // Recargar documentos cada 30 segundos
        setInterval(cargarDocumentos, 30000);
    };
</script>
</body>

</html>
