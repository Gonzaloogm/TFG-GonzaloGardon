<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Asistente Contextual TFG</title>
    <style>
        :root {
            --bg-body: #f7f7f8;
            --primary-color: #10a37f;
            --primary-hover: #0e8c6d;
            --text-primary: #343541;
            --text-secondary: #6e6e80;
            --border-color: #e5e5e5;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-primary);
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .icon-container {
            background-color: #e7f8f3;
            color: var(--primary-color);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }

        .login-container h1 {
            font-size: 22px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .login-container p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background-color: #fafafa;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            background-color: white;
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .login-btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-msg {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .error-msg.error {
            background: #fdf2f2;
            color: #b91c1c;
            border: 1px solid #fde8e8;
        }

        .error-msg.info {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="icon-container">
            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="28" width="28"
                xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z">
                </path>
            </svg>
        </div>

        <h1>Asistente Contextual</h1>
        <p>Portal de Empleados - Acceso Seguro</p>

        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" placeholder="Tu nombre de usuario..." autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña..." autocomplete="current-password">
        </div>

        <button class="login-btn" id="login-btn">
            <svg id="login-icon" stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                stroke-linejoin="round" height="18" width="18" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            <span id="login-text">Iniciar Sesión</span>
        </button>

        <div class="error-msg" id="error-msg"></div>
    </div>

    <script>
        (function () {
            'use strict';

            const btnLogin = document.getElementById('login-btn');
            const loginIcon = document.getElementById('login-icon');
            const loginText = document.getElementById('login-text');
            const errorMsg = document.getElementById('error-msg');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            // Si viene redirigido desde chat.html con ?error=session_expired
            const params = new URLSearchParams(window.location.search);
            if (params.get('error') === 'session_expired') {
                errorMsg.textContent = 'Tu sesión ha expirado. Inicia sesión de nuevo.';
                errorMsg.className = 'error-msg info visible';
            }

            // Si ya tiene token válido en sessionStorage, redirigir directamente
            if (sessionStorage.getItem('jwt_token')) {
                window.location.href = 'chat.html';
            }

            function mostrarError(mensaje, tipo) {
                errorMsg.textContent = mensaje;
                errorMsg.className = 'error-msg ' + (tipo || 'error') + ' visible';
            }

            function setLoading(loading) {
                btnLogin.disabled = loading;
                usernameInput.disabled = loading;
                passwordInput.disabled = loading;
                if (loading) {
                    loginIcon.style.display = 'none';
                    loginText.innerHTML = '<div style="width:16px;height:16px;border:2px solid white;border-bottom-color:transparent;border-radius:50%;display:inline-block;animation:rotation 1s linear infinite;"></div> Autenticando...';
                } else {
                    loginIcon.style.display = '';
                    loginText.textContent = 'Iniciar Sesión';
                }
            }

            async function iniciarSesion() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                // Validación básica en cliente
                if (!username || !password) {
                    mostrarError('Introduce tu usuario y contraseña.');
                    return;
                }

                // Ocultar errores previos
                errorMsg.className = 'error-msg';
                setLoading(true);

                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        // Guardar token y username en sessionStorage
                        sessionStorage.setItem('jwt_token', data.token);
                        sessionStorage.setItem('jwt_username', username);
                        // Redirigir al chat
                        window.location.href = 'chat.html';
                    } else if (response.status === 401) {
                        setLoading(false);
                        mostrarError('Credenciales incorrectas.');
                        passwordInput.value = '';
                        passwordInput.focus();
                    } else {
                        setLoading(false);
                        const errData = await response.json().catch(() => null);
                        mostrarError(errData?.error || 'Error del servidor. Inténtalo de nuevo.');
                    }
                } catch (e) {
                    setLoading(false);
                    mostrarError('Error de conexión. Inténtalo de nuevo.');
                }
            }

            // Event listeners
            btnLogin.addEventListener('click', iniciarSesion);
            passwordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); iniciarSesion(); }
            });
            usernameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); passwordInput.focus(); }
            });

            // Focus en el primer campo al cargar
            usernameInput.focus();
        })();
    </script>
</body>

</html>
