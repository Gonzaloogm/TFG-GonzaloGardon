# =============================================================
# APLICACIËN
# =============================================================
quarkus.application.name=asistente-contextual-backend

# =============================================================
# GOOGLE AI GEMINI ? Chat
# =============================================================
quarkus.langchain4j.ai.gemini.api-key=${GEMINI_API_KEY}
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-2.0-flash
quarkus.langchain4j.ai.gemini.chat-model.temperature=0.7
quarkus.langchain4j.ai.gemini.chat-model.max-output-tokens=2048
quarkus.langchain4j.ai.gemini.chat-model.top-p=0.95
quarkus.langchain4j.ai.gemini.chat-model.timeout=PT100s

# =============================================================
# EMBEDDINGS ? Modelo local ONNX BgeSmallEn (384 dimensiones)
# El modelo Gemini text-embedding-004 estß comentado porque
# el proveedor activo es el modelo ONNX local (sin coste de API).
# Para cambiar a Gemini: descomentar la lÝnea de gemini embedding,
# comentar la de provider, y cambiar dimension a 768.
# =============================================================
quarkus.langchain4j.embedding-model.provider=dev.langchain4j.model.embedding.onnx.bgesmallenq.BgeSmallEnQuantizedEmbeddingModel
# quarkus.langchain4j.ai.gemini.embedding-model.model-id=text-embedding-004

# =============================================================
# POSTGRESQL
# =============================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/asistente_contextual
quarkus.hibernate-orm.database.generation=update

# =============================================================
# PGVECTOR
# Dimensi¾n 384 corresponde al modelo BgeSmallEnQuantized.
# El namespace correcto en Quarkus 3.17 + Quarkiverse es
# quarkus.langchain4j.pgvector.* (sin "ai-gemini" intermedio).
# Las claves de columna (id-column, text-column, etc.) no estßn
# soportadas en esta versi¾n ? Quarkiverse usa sus propios
# defaults: embedding_id, embedding, text, metadata.
# =============================================================
quarkus.langchain4j.pgvector.dimension=384
quarkus.langchain4j.pgvector.table=embeddings
quarkus.langchain4j.pgvector.index-list-size=1000

# =============================================================
# WEBSOCKETS
# =============================================================
quarkus.websockets-next.server.max-message-size=1048576

# =============================================================
# OBSERVABILIDAD
# =============================================================
quarkus.otel.sdk.disabled=true

# =============================================================
# LOGGING
# =============================================================
quarkus.log.level=INFO
quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG
quarkus.log.category."com.gonzalo.tfg.config.RagConfig".level=DEBUG
quarkus.langchain4j.log-requests=false
quarkus.langchain4j.log-responses=false
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.jackson.write-dates-as-timestamps=false
quarkus.jackson.fail-on-unknown-properties=false

# =============================================================
# JWT ? SmallRye JWT (Seguridad Zero-Trust)
# =============================================================
# Clave privada RSA para FIRMAR tokens (solo AuthController)
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem

# Clave p·blica RSA para VERIFICAR tokens (filtro automßtico + JwtValidator)
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem

# Emisor del token ? debe coincidir con el claim "iss" generado en AuthController
mp.jwt.verify.issuer=asistente-contextual-backend
smallrye.jwt.new-token.issuer=asistente-contextual-backend

# 1. Dejar p·blico solo el endpoint de Login
quarkus.http.auth.permission.public.paths=/api/auth/login
quarkus.http.auth.permission.public.policy=permit

# 2. Proteger obligatoriamente la gesti¾n de Documentos y Chats con JWT
quarkus.http.auth.permission.api.paths=/api/documentos/*,/api/chats/*
quarkus.http.auth.permission.api.policy=authenticated

# 3. La ruta de administraci¾n usa su propio filtro (Admin Key)
quarkus.http.auth.permission.admin.paths=/api/admin/*
quarkus.http.auth.permission.admin.policy=permit

# =============================================================
# SEGURIDAD (ADMIN BOOTSTRAP API)
# =============================================================
app.admin.key=clave-secreta-admin-cambiar-en-produccion
app.bootstrap.admin.password=admin123