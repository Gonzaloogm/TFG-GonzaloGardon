# Configuración de la aplicación
quarkus.application.name=asistente-contextual-backend

# Configuración de Google AI Gemini
quarkus.langchain4j.ai.gemini.api-key=${GEMINI_API_KEY:AIzaSyA8sPW4iLiOQsT6aOibyQcv_0Z3Itl_I6g}
quarkus.langchain4j.ai.gemini.chat-model.model-name=gemini-1.5-flash
quarkus.langchain4j.ai.gemini.chat-model.temperature=0.7
quarkus.langchain4j.ai.gemini.chat-model.max-output-tokens=2048

# Configuración de embeddings
quarkus.langchain4j.ai.gemini.embedding-model.model-name=text-embedding-004

# PostgreSQL con pgvector
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/asistente_contextual}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update

# CONFIGURACIÓN CRÍTICA DE PGVECTOR
quarkus.langchain4j.pgvector.dimension=768
quarkus.langchain4j.pgvector.table-name=embeddings
quarkus.langchain4j.pgvector.index-list-size=1000

# WebSockets Next
quarkus.websockets-next.server.max-message-size=1048576

# CORS y seguridad - PERMITIR TODO
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
quarkus.http.cors.headers=*
quarkus.http.cors.credentials=true
quarkus.http.cors.max-age=24H

# WebSocket - PERMITIR TODO
quarkus.websockets-next.server.max-message-size=104857600
quarkus.websockets-next.server.validate-server-messages=false
quarkus.websockets-next.server.validate-client-messages=false

# Desabilitar autenticación y autorización
quarkus.http.auth.permission.all.enabled=false
quarkus.security.auth.enabled-in-dev-mode=false

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG

# Dev mode
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n