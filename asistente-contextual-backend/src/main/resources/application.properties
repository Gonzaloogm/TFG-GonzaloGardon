# Configuracion de la aplicacion
quarkus.application.name=asistente-contextual-backend
# Google AI Gemini
quarkus.langchain4j.ai.gemini.api-key=AIzaSyA8sPW4iLiOQsT6aOibyQcv_0Z3Itl_I6g
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-2.0-flash
quarkus.langchain4j.ai.gemini.chat-model.temperature=0.7
quarkus.langchain4j.ai.gemini.chat-model.max-output-tokens=2048
quarkus.langchain4j.ai.gemini.chat-model.top-p=0.95
# Embeddings
#quarkus.langchain4j.ai.gemini.embedding-model.model-id=text-embedding-004
# PostgreSQL con pgvector
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/asistente_contextual
# PGVECTOR
#quarkus.langchain4j.pgvector.dimension=768
quarkus.langchain4j.pgvector.index-list-size=1000
quarkus.hibernate-orm.database.generation=update
# WebSockets Next
quarkus.websockets-next.server.max-message-size=1048576
quarkus.otel.sdk.disabled=true
# Logging
quarkus.log.level=INFO
quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
#proveedor de embeddings es local
quarkus.langchain4j.embedding-model.provider=dev.langchain4j.model.embedding.onnx.bgesmallenq.BgeSmallEnQuantizedEmbeddingModel
quarkus.langchain4j.pgvector.dimension=384
quarkus.langchain4j.log-requests=false
quarkus.langchain4j.log-responses=false
